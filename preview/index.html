<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apeach Photobooth - Preview 🌸</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: linear-gradient(135deg, hsl(350, 100%, 94%) 0%, hsl(20, 100%, 92%) 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Fredoka', sans-serif;
      color: hsl(343, 40%, 25%);
      box-sizing: border-box;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 400px;
      width: 100%;
    }
    .tip {
      background: rgba(255, 255, 255, 0.95);
      padding: 14px 24px;
      border: 3px dashed hsl(350, 100%, 88%);
      border-radius: 20px;
      box-shadow: 0 8px 24px rgba(220, 130, 140, 0.15);
      font-weight: 600;
      margin-bottom: 20px;
      font-size: 15px;
      text-align: center;
      line-height: 1.4;
    }
    .img-wrapper {
      background: #fff;
      padding: 12px;
      border-radius: 16px;
      box-shadow: 0 12px 32px rgba(220, 130, 140, 0.3);
      max-width: 300px;
      width: 100%;
      box-sizing: border-box;
      display: flex;
      justify-content: center;
    }
    img {
      width: 100%;
      height: auto;
      border-radius: 8px;
    }
    .actions-row {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }
    .btn {
      background: linear-gradient(135deg, hsl(20, 100%, 75%), hsl(343, 85%, 63%));
      border: none;
      border-radius: 50px;
      padding: 10px 24px;
      font-size: 0.95rem;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(245, 141, 158, 0.35);
      transition: all 0.2s ease;
      text-decoration: none;
      display: inline-block;
      text-align: center;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(245, 141, 158, 0.45);
    }
    .btn-secondary {
      background: transparent;
      border: 2px solid hsl(343, 85%, 63%);
      color: hsl(343, 40%, 25%);
      box-shadow: none;
    }
    .btn-secondary:hover {
      background: rgba(255, 200, 200, 0.15);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="tip">🌸 Nhấn giữ lâu vào dải ảnh bên dưới và chọn "Lưu hình ảnh" để tải về máy nhé! 🌸</div>
    <div class="img-wrapper">
      <img id="strip-image" src="" alt="Apeach Photobooth">
    </div>
    <div class="actions-row">
      <a href="/" class="btn btn-secondary">Quay lại ⬅️</a>
      <button id="btn-download-native" class="btn">Tải Trực Tiếp 💾</button>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const dataUrl = sessionStorage.getItem('compiledStrip');
      const img = document.getElementById('strip-image');
      const btnDownload = document.getElementById('btn-download-native');

      if (dataUrl) {
        img.src = dataUrl;
        
        // Native download button inside preview page as extra helper
        btnDownload.addEventListener('click', () => {
          const link = document.createElement('a');
          link.download = `apeach_photobooth_${Date.now()}.png`;
          link.href = dataUrl;
          link.click();
        });
      } else {
        // Redirect to main page if no image data found
        window.location.href = '/';
      }
    });
  </script>
</body>
</html>
